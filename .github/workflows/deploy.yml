name: Deploy to Azure Web App

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: blazorships
  AZURE_LOCATION: westeurope
  DOTNET_VERSION: '10.0.x'
  PUBLISH_DIR: ./publish

jobs:
  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure (Bicep)
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ env.AZURE_LOCATION }}
          template: infra/main.bicep
          parameters: webAppName=${{ env.AZURE_WEBAPP_NAME }} location=${{ env.AZURE_LOCATION }}
          failOnStdErr: false

  deploy:
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Blazorships.sln

      - name: Publish Server
        run: dotnet publish Server/Blazorships.Server.csproj -c Release -o ${{ env.PUBLISH_DIR }} --no-restore

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
